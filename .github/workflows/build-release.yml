name: Build Release

on:
  push:
    tags:
      - 'v*'  # 推送 tag 时触发，如 v1.0.0
  workflow_dispatch:  # 支持手动触发

env:
  APP_NAME: Open-AutoGLM
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================
  # macOS 构建 (Web Server Only) - Apple Silicon
  # ============================================
  build-macos-arm:
    runs-on: macos-14  # M1 runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Web Server
        run: |
          pyinstaller --onefile \
            --name "${{ env.APP_NAME }}-web" \
            --add-data "phone_agent:phone_agent" \
            --add-data "web_app:web_app" \
            --hidden-import openai \
            --hidden-import anthropic \
            --hidden-import google.generativeai \
            --hidden-import fastapi \
            --hidden-import fastapi.middleware \
            --hidden-import fastapi.middleware.cors \
            --hidden-import fastapi.staticfiles \
            --hidden-import fastapi.templating \
            --hidden-import fastapi.responses \
            --hidden-import fastapi.security \
            --hidden-import starlette \
            --hidden-import starlette.middleware \
            --hidden-import starlette.middleware.cors \
            --hidden-import starlette.staticfiles \
            --hidden-import starlette.responses \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import websockets \
            --hidden-import pydantic \
            --hidden-import qrcode \
            --hidden-import zeroconf \
            --hidden-import requests \
            --hidden-import aiofiles \
            --hidden-import python_multipart \
            --hidden-import email \
            --hidden-import email.mime \
            --hidden-import email.mime.base \
            --hidden-import email.mime.text \
            --hidden-import email.mime.image \
            --hidden-import email.mime.multipart \
            --hidden-import email.mime.application \
            --hidden-import smtplib \
            --hidden-import ssl \
            --hidden-import sqlite3 \
            --hidden-import secrets \
            --hidden-import asyncio \
            --hidden-import contextlib \
            --hidden-import dataclasses \
            --hidden-import tempfile \
            --hidden-import uuid \
            --hidden-import base64 \
            --hidden-import json \
            --hidden-import logging \
            --hidden-import httpx \
            --hidden-import telegram \
            --hidden-import apscheduler \
            --collect-submodules fastapi \
            --collect-submodules starlette \
            --collect-submodules uvicorn \
            --collect-submodules pydantic \
            --collect-submodules email \
            --collect-submodules httpx \
            --collect-submodules telegram \
            --collect-submodules apscheduler \
            run_web.py

      - name: Package Web Server
        run: |
          cd dist
          zip "${{ env.APP_NAME }}-macOS-ARM64-Web.zip" "${{ env.APP_NAME }}-web"

      - name: Upload macOS ARM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-builds
          path: dist/*.zip

  # ============================================
  # macOS 构建 (Web Server Only) - Intel
  # ============================================
  build-macos:
    runs-on: macos-13  # Intel runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Web Server
        run: |
          pyinstaller --onefile \
            --name "${{ env.APP_NAME }}-web" \
            --add-data "phone_agent:phone_agent" \
            --add-data "web_app:web_app" \
            --hidden-import openai \
            --hidden-import anthropic \
            --hidden-import google.generativeai \
            --hidden-import fastapi \
            --hidden-import fastapi.middleware \
            --hidden-import fastapi.middleware.cors \
            --hidden-import fastapi.staticfiles \
            --hidden-import fastapi.templating \
            --hidden-import fastapi.responses \
            --hidden-import fastapi.security \
            --hidden-import starlette \
            --hidden-import starlette.middleware \
            --hidden-import starlette.middleware.cors \
            --hidden-import starlette.staticfiles \
            --hidden-import starlette.responses \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import websockets \
            --hidden-import pydantic \
            --hidden-import qrcode \
            --hidden-import zeroconf \
            --hidden-import requests \
            --hidden-import aiofiles \
            --hidden-import python_multipart \
            --hidden-import email \
            --hidden-import email.mime \
            --hidden-import email.mime.base \
            --hidden-import email.mime.text \
            --hidden-import email.mime.image \
            --hidden-import email.mime.multipart \
            --hidden-import email.mime.application \
            --hidden-import smtplib \
            --hidden-import ssl \
            --hidden-import sqlite3 \
            --hidden-import secrets \
            --hidden-import asyncio \
            --hidden-import contextlib \
            --hidden-import dataclasses \
            --hidden-import tempfile \
            --hidden-import uuid \
            --hidden-import base64 \
            --hidden-import json \
            --hidden-import logging \
            --hidden-import httpx \
            --hidden-import telegram \
            --hidden-import apscheduler \
            --collect-submodules fastapi \
            --collect-submodules starlette \
            --collect-submodules uvicorn \
            --collect-submodules pydantic \
            --collect-submodules email \
            --collect-submodules httpx \
            --collect-submodules telegram \
            --collect-submodules apscheduler \
            run_web.py

      - name: Package Web Server
        run: |
          cd dist
          zip "${{ env.APP_NAME }}-macOS-Intel-Web.zip" "${{ env.APP_NAME }}-web"

      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-builds
          path: dist/*.zip

  # ============================================
  # Windows 构建 (Web Server Only)
  # ============================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Web Server
        run: |
          pyinstaller --onefile `
            --name "${{ env.APP_NAME }}-web" `
            --add-data "phone_agent;phone_agent" `
            --add-data "web_app;web_app" `
            --hidden-import openai `
            --hidden-import anthropic `
            --hidden-import google.generativeai `
            --hidden-import fastapi `
            --hidden-import fastapi.middleware `
            --hidden-import fastapi.middleware.cors `
            --hidden-import fastapi.staticfiles `
            --hidden-import fastapi.templating `
            --hidden-import fastapi.responses `
            --hidden-import fastapi.security `
            --hidden-import starlette `
            --hidden-import starlette.middleware `
            --hidden-import starlette.middleware.cors `
            --hidden-import starlette.staticfiles `
            --hidden-import starlette.responses `
            --hidden-import uvicorn `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import websockets `
            --hidden-import pydantic `
            --hidden-import qrcode `
            --hidden-import zeroconf `
            --hidden-import requests `
            --hidden-import aiofiles `
            --hidden-import python_multipart `
            --hidden-import email `
            --hidden-import email.mime `
            --hidden-import email.mime.base `
            --hidden-import email.mime.text `
            --hidden-import email.mime.image `
            --hidden-import email.mime.multipart `
            --hidden-import email.mime.application `
            --hidden-import smtplib `
            --hidden-import ssl `
            --hidden-import sqlite3 `
            --hidden-import secrets `
            --hidden-import asyncio `
            --hidden-import contextlib `
            --hidden-import dataclasses `
            --hidden-import tempfile `
            --hidden-import uuid `
            --hidden-import base64 `
            --hidden-import json `
            --hidden-import logging `
            --hidden-import httpx `
            --hidden-import telegram `
            --hidden-import apscheduler `
            --collect-submodules fastapi `
            --collect-submodules starlette `
            --collect-submodules uvicorn `
            --collect-submodules pydantic `
            --collect-submodules email `
            --collect-submodules httpx `
            --collect-submodules telegram `
            --collect-submodules apscheduler `
            run_web.py

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path "dist\${{ env.APP_NAME }}-web.exe" -DestinationPath "dist\${{ env.APP_NAME }}-Windows-Web.zip"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: dist/*.zip

  # ============================================
  # Linux 构建 (Web Server Only)
  # ============================================
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential

      - name: Install fpm for packaging
        run: sudo gem install fpm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Web Server
        run: |
          pyinstaller --onefile \
            --name "${{ env.APP_NAME }}-web" \
            --add-data "phone_agent:phone_agent" \
            --add-data "web_app:web_app" \
            --hidden-import openai \
            --hidden-import anthropic \
            --hidden-import google.generativeai \
            --hidden-import fastapi \
            --hidden-import fastapi.middleware \
            --hidden-import fastapi.middleware.cors \
            --hidden-import fastapi.staticfiles \
            --hidden-import fastapi.templating \
            --hidden-import fastapi.responses \
            --hidden-import fastapi.security \
            --hidden-import starlette \
            --hidden-import starlette.middleware \
            --hidden-import starlette.middleware.cors \
            --hidden-import starlette.staticfiles \
            --hidden-import starlette.responses \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import websockets \
            --hidden-import pydantic \
            --hidden-import qrcode \
            --hidden-import zeroconf \
            --hidden-import requests \
            --hidden-import aiofiles \
            --hidden-import python_multipart \
            --hidden-import email \
            --hidden-import email.mime \
            --hidden-import email.mime.base \
            --hidden-import email.mime.text \
            --hidden-import email.mime.image \
            --hidden-import email.mime.multipart \
            --hidden-import email.mime.application \
            --hidden-import smtplib \
            --hidden-import ssl \
            --hidden-import sqlite3 \
            --hidden-import secrets \
            --hidden-import asyncio \
            --hidden-import contextlib \
            --hidden-import dataclasses \
            --hidden-import tempfile \
            --hidden-import uuid \
            --hidden-import base64 \
            --hidden-import json \
            --hidden-import logging \
            --hidden-import httpx \
            --hidden-import telegram \
            --hidden-import apscheduler \
            --collect-submodules fastapi \
            --collect-submodules starlette \
            --collect-submodules uvicorn \
            --collect-submodules pydantic \
            --collect-submodules email \
            --collect-submodules httpx \
            --collect-submodules telegram \
            --collect-submodules apscheduler \
            run_web.py

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Create DEB package
        run: |
          mkdir -p web-pkg/usr/local/bin
          cp dist/${{ env.APP_NAME }}-web web-pkg/usr/local/bin/open-autoglm-web
          fpm -s dir -t deb \
            -n "open-autoglm-web" \
            -v "${{ steps.version.outputs.VERSION }}" \
            --description "AI-powered phone automation Web Server" \
            --maintainer "Zhipu AI" \
            -C web-pkg .
          mv open-autoglm-web*.deb "dist/${{ env.APP_NAME }}-Linux-Web.deb"

      - name: Create tarball
        run: |
          cd dist
          tar -czvf "${{ env.APP_NAME }}-Linux-Web.tar.gz" "${{ env.APP_NAME }}-web"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.deb
            dist/*.tar.gz

  # ============================================
  # 发布到 GitHub Releases
  # ============================================
  release:
    needs: [build-macos-arm, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Download Options

            ### Web 版本 (Web Server)
            启动 Web 服务，支持浏览器访问和 Telegram Bot 控制

            | 平台 | 下载 |
            |------|------|
            | **macOS (Apple Silicon M1/M2/M3)** | `*-macOS-ARM64-Web.zip` |
            | **macOS (Intel)** | `*-macOS-Intel-Web.zip` |
            | **Windows** | `*-Windows-Web.zip` |
            | **Linux (DEB)** | `*-Linux-Web.deb` |
            | **Linux (通用)** | `*-Linux-Web.tar.gz` |

            ### 使用说明
            1. 下载对应平台的文件并解压
            2. 运行可执行文件启动 Web 服务
            3. 浏览器访问 http://localhost:8080
            4. （可选）配置 Telegram Bot 进行远程控制

            ### macOS 首次打开提示
            如果提示"无法验证开发者"，请执行：
            ```bash
            xattr -cr Open-AutoGLM-web
            ```

            ---

          files: |
            artifacts/macos-arm-builds/*
            artifacts/macos-intel-builds/*
            artifacts/windows-builds/*
            artifacts/linux-builds/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
